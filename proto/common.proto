syntax = "proto3";

package benchmark;

message Empty {}

message ServiceInfo {
    string name = 1;
    string language = 2;
    string framework = 3;
    string version = 4;
    int32 rest_port = 5;
    int32 grpc_port = 6;
}

message ServiceList {
    repeated ServiceInfo services = 1;
}

message TimingInfo {
    int64 start_time = 1;
    int64 end_time = 2;
    int64 duration_ms = 3;
}

message ErrorResponse {
    string code = 1;
    string message = 2;
}