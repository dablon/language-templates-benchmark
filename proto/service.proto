syntax = "proto3";

package benchmark;

option go_package = "github.com/nico/language-templates-benchmark/gen/go/benchmark";

// ============================================
// Aggregator Service (gRPC)
// ============================================

service Aggregator {
    rpc Hello(HelloRequest) returns (HelloResponse);
    rpc Health(HealthRequest) returns (HealthResponse);
    rpc Aggregate(AggregateRequest) returns (AggregateResponse);
}

message HelloRequest {
    string name = 1;
}

message HelloResponse {
    string service_name = 1;
    string message = 2;
    string version = 3;
    int64 timestamp = 4;
    repeated string results = 5;
}

message HealthRequest {}

message ServiceHealth {
    string service_name = 1;
    bool healthy = 2;
    string status = 3;
}

message HealthResponse {
    map<string, bool> services = 1;
    int64 timestamp = 2;
}

message AggregateRequest {
    string name = 1;
}

message ServiceResult {
    string service = 1;
    string message = 2;
    uint64 elapsed_ms = 3;
    bool success = 4;
}

message AggregateResponse {
    string caller = 1;
    repeated ServiceResult results = 2;
    uint64 total_time_ms = 3;
}