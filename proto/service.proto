syntax = "proto3";

package benchmark;

option go_package = "github.com/nico/language-templates-benchmark/gen/go/benchmark";

message HelloRequest {
    string name = 1;
    int64 timestamp = 2;
}

message HelloResponse {
    string service_name = 1;
    string message = 2;
    string version = 3;
    int64 timestamp = 4;
}

message HealthRequest {}

message HealthCheck {
    string service_name = 1;
    bool healthy = 2;
    string status = 3;
}

message HealthResponse {
    repeated HealthCheck services = 1;
    int64 timestamp = 2;
}

message AggregateRequest {
    string name = 1;
}

message AggregateResponse {
    repeated HelloResponse results = 1;
    int64 total_time_ms = 2;
}

message ChainRequest {
    string payload = 1;
    int32 hop_count = 2;
}

message ChainResponse {
    repeated string results = 1;
    int64 total_time_ms = 2;
}