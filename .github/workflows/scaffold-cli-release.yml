name: Build and release scaffold-cli

on:
  push:
    branches:
      - '**'
    paths:
      - '.github/workflows/scaffold-cli-release.yml'
      - 'scaffold-cli/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scaffold-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify scaffold-cli
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scaffold-cli
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: scaffold-cli-x86_64-unknown-linux-gnu.tar.gz
            binary_name: scaffold-cli
            archive_type: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: scaffold-cli-x86_64-pc-windows-msvc.zip
            binary_name: scaffold-cli.exe
            archive_type: zip
          - os: macos-13
            target: x86_64-apple-darwin
            archive_name: scaffold-cli-x86_64-apple-darwin.tar.gz
            binary_name: scaffold-cli
            archive_type: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_name: scaffold-cli-aarch64-apple-darwin.tar.gz
            binary_name: scaffold-cli
            archive_type: tar.gz
    defaults:
      run:
        working-directory: scaffold-cli
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix archive
        if: matrix.archive_type == 'tar.gz'
        run: |
          tar -C "target/${{ matrix.target }}/release" -czf "${{ matrix.archive_name }}" "${{ matrix.binary_name }}"

      - name: Package Windows archive
        if: matrix.archive_type == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" -DestinationPath "${{ matrix.archive_name }}"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.target }}
          path: ${{ github.workspace }}/scaffold-cli/${{ matrix.archive_name }}
          if-no-files-found: error

  prepare-release:
    name: Prepare release metadata
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Generate timestamped tag
        id: tag
        run: echo "value=v0.0.$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

  release:
    name: Publish GitHub release
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - build
      - prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-assets

      - name: Stage release assets
        run: |
          mkdir dist
          find release-assets -type f -exec cp {} dist/ \;
          ls -lah dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release create "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "scaffold-cli $TAG" \
            --generate-notes
